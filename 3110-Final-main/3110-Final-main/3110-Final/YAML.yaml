# Write a short, attention-grabbing description of your project.
desc: >
  Our project is a rendition of the board game Monopoly. Player characteristics can easily be 
  added as functions in the Player module, and Property and Special Square characteristics 
  can be modified in a similar way via the PropSquare and SpecialSquare modules. The Board module 
  contains all of the drawing functions using the Graphics library, and the Game module runs the 
  game recursive loop.
  
  Visually, four players will take turns moving around the board (made up of properties). When you 
  roll the dice in the center (click on them), the player whose turn it is will move forward that 
  number of spaces. Above the board there are a series of buttons with messages that say what the 
  player can do for their turn, assuming they meet the requirements. When the player is done with 
  their turn, they select the button labeled "next", and then the next player rolls the dice.
  
  The game is played until there is only one player left, at which point the game prints a message saying
  that player has won, and then it ends the game.
  